services:
  postgres:
    image: postgres:17-alpine
    container_name: anomaly-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MLFLOW_POSTGRES_DB: ${MLFLOW_POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - anomaly-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: anomaly-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - anomaly-network

  minio-init:
    image: minio/mc:latest
    container_name: anomaly-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME};
      "
    networks:
      - anomaly-network

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    image: anomaly-mlflow:latest
    container_name: anomaly-mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "${MLFLOW_PORT}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${MLFLOW_POSTGRES_DB}
      --artifacts-destination s3://${MINIO_BUCKET_NAME}
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - anomaly-network

  redis:
    image: redis:7-alpine
    container_name: anomaly-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - anomaly-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: anomaly-api:latest
    container_name: anomaly-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_HOST: redis
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anomaly-network

volumes:
  postgres_data:
  minio_data:

networks:
  anomaly-network:
    driver: bridge
